{% extends "base.html" %}
{% block title %}Assigned Requests{% endblock %}

{% block content %}
<h2>Assigned Requests</h2>

<table class="table">
    <thead>
        <tr>
            <th>Item ID</th>
            <th>Address</th>
            <th>Date</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="assignedTable"></tbody>
</table>

<script>
async function loadAssigned() {
    const token = localStorage.getItem("token");

    const res = await fetch("/recycler/assigned-data", {
        headers: { "Authorization": "Bearer " + token }
    });

    let data = await res.json();

    let rows = "";
    data.assigned.forEach(r => {
        rows += `
            <tr>
                <td>${r.item_id}</td>
                <td>${r.address}</td>
                <td>${r.date}</td>
                <td>
                    <button onclick="complete('${r._id}')" class="btn">Complete</button>
                </td>
            </tr>
        `;
    });

    document.getElementById("assignedTable").innerHTML = rows;
}

async function complete(id) {
    const token = localStorage.getItem("token");

    await fetch("/recycler/complete-request", {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + token,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ request_id: id })
    });

    alert("Completed!");
    loadAssigned();
}

loadAssigned();
</script>
{% endblock %}
