{% extends "base.html" %}
{% block title %}Assigned Pickup Requests{% endblock %}

{% block content %}

<h2 class="dashboard-header">My Assigned Pickups</h2>

<table class="table">
    <thead>
        <tr>
            <th>Request ID</th>
            <th>Item ID</th>
            <th>User ID</th>
            <th>Address</th>
            <th>Date</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody id="assignedRequestsBody">
    </tbody>
</table>

<script>
async function loadAssignedRequests() {

    const token = localStorage.getItem("token");

    const res = await fetch("/recycler/assigned-requests", {
        method: "GET",
        headers: { "Authorization": "Bearer " + token }
    });

    const data = await res.json();

    if (!res.ok) {
        alert("Please login again");
        window.location.href = "/auth/login";
        return;
    }

    let rows = "";

    data.requests.forEach(r => {
        rows += `
            <tr>
                <td>${r._id}</td>
                <td>${r.item_id}</td>
                <td>${r.user_id}</td>
                <td>${r.address}</td>
                <td>${r.date}</td>
                <td>${r.status}</td>
                <td>
                    <button onclick="markCompleted('${r._id}')" class="btn eco-btn">
                        Mark Completed
                    </button>
                </td>
            </tr>
        `;
    });

    document.getElementById("assignedRequestsBody").innerHTML = rows;
}


// ----------- MARK COMPLETED FUNCTION -------------
async function markCompleted(requestId) {

    const token = localStorage.getItem("token");

    const res = await fetch("/recycler/complete-request/" + requestId, {
        method: "PUT",
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const data = await res.json();

    if (res.ok) {
        alert("Pickup Marked Completed!");
        loadAssignedRequests();
    } else {
        alert(data.error || "Something went wrong");
    }
}

loadAssignedRequests();
</script>

{% endblock %}
