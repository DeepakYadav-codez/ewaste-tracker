{% extends "base.html" %}
{% block title %}Assigned Requests{% endblock %}

{% block content %}

<h2 class="dashboard-header">Assigned Pickup Requests</h2>

<table class="table">
    <thead>
        <tr>
            <th>Request ID</th>
            <th>User ID</th>
            <th>Item ID</th>
            <th>Address</th>
            <th>Date</th>
            <th>Status</th>
            <th>Complete</th>
        </tr>
    </thead>

    <tbody id="assignedTable">
        <!-- Data loads here -->
    </tbody>
</table>

<script>
async function loadAssigned() {
    const token = localStorage.getItem("token");

    const res = await fetch("/recycler/assigned-data", {
        headers: { "Authorization": "Bearer " + token }
    });

    const data = await res.json();

    let rows = "";

    data.assigned.forEach(r => {
        rows += `
        <tr>
            <td>${r._id}</td>
            <td>${r.user_id}</td>
            <td>${r.item_id}</td>
            <td>${r.address}</td>
            <td>${r.date}</td>
            <td>${r.status}</td>
            <td>
                <button class="btn eco-btn" onclick="completeRequest('${r._id}')">Done</button>
            </td>
        </tr>`;
    });

    document.getElementById("assignedTable").innerHTML = rows;
}

async function completeRequest(id) {
    const token = localStorage.getItem("token");

    const res = await fetch(`/recycler/complete-request/${id}`, {
        method: "PUT",
        headers: { "Authorization": "Bearer " + token }
    });

    const data = await res.json();

    if (res.ok) {
        alert("Marked Completed!");
        window.location.reload();
    } else {
        alert(data.error);
    }
}

loadAssigned();
</script>

{% endblock %}
