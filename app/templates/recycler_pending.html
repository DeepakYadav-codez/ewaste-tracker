{% extends "base.html" %}
{% block title %}Pending Requests{% endblock %}

{% block content %}
<h2>Pending Requests</h2>

<table class="table">
    <thead>
        <tr>
            <th>Item ID</th>
            <th>Address</th>
            <th>Date</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="pendingTable"></tbody>
</table>

<script>
async function loadPending() {
    const token = localStorage.getItem("token");

    const res = await fetch("/recycler/pending-data", {
        headers: { "Authorization": "Bearer " + token }
    });

    let data = await res.json();

    let rows = "";
    data.pending.forEach(r => {
        rows += `
            <tr>
                <td>${r.item_id}</td>
                <td>${r.address}</td>
                <td>${r.date}</td>
                <td>
                    <button onclick="accept('${r._id}')" class="btn">Accept</button>
                </td>
            </tr>
        `;
    });

    document.getElementById("pendingTable").innerHTML = rows;
}

async function accept(id) {
    const token = localStorage.getItem("token");

    await fetch("/recycler/accept-request", {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + token,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ request_id: id })
    });

    alert("Accepted!");
    loadPending();
}

loadPending();
</script>
{% endblock %}
