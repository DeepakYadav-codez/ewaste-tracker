<!DOCTYPE html>
<html>
<body style="font-family: Arial; background:#f2f2f2; padding:20px;">
  <div style="max-width:600px; background:white; padding:20px; border-radius:10px;">

    <h2 style="color:#007bff;">Pickup Accepted</h2>

    <p>Hello {{ user_name }},</p>

    <p>The recycler has accepted your pickup request.</p>

    <p><b>Recycler:</b> {{ recycler_name }}</p>
    <p><b>Pickup Date:</b> {{ date }}</p>
    <p><b>Address:</b> {{ address }}</p>

    <br>
    <p>Thank you for using E-Waste Tracker.</p>
  </div>
</body>
</html>
