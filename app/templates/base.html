<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}E-Waste Tracker{% endblock %}</title>

    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body id="body">

    <!-- ================= NAVBAR ================= -->
    <nav class="navbar" id="navbar">
        <div class="nav-left">
            <img src="/static/images/logo.png" class="nav-logo">
            <span class="nav-title">E-Waste Tracker</span>
        </div>

        <ul class="nav-links" id="navLinks"></ul>

        <button id="darkToggle" class="nav-btn">Dark Mode</button>
        <button class="nav-btn" onclick="logout()">Logout</button>
    </nav>

    <!-- ================= MAIN CONTENT ================= -->
    <main class="content-left" id="contentArea">
        {% block content %}{% endblock %}
    </main>

    <script>
        const role = localStorage.getItem("role");
        const nav = document.getElementById("navLinks");

        /* USER NAV */
        if (role === "user") {
            nav.innerHTML = `
                <li><a href="/user/dashboard">Dashboard</a></li>
                <li><a href="/user/add-item-page">Add Item</a></li>
                <li><a href="/user/my-items-page">My Items</a></li>
                <li><a href="/user/my-requests-page">My Requests</a></li>
            `;
        }

        /* RECYCLER NAV */
        if (role === "recycler") {
            nav.innerHTML = `
                <li><a href="/recycler/dashboard">Dashboard</a></li>
                <li><a href="/recycler/pending">Pending</a></li>
                <li><a href="/recycler/assigned">Assigned</a></li>
            `;
        }

        /* ADMIN NAV */
        if (role === "admin") {
            nav.innerHTML = `
                <li><a href="/admin/dashboard">Dashboard</a></li>
                <li><a href="/admin/users-page">Users</a></li>
                <li><a href="/admin/recyclers-page">Recyclers</a></li>
                <li><a href="/admin/requests-page">Requests</a></li>
            `;
        }

        function logout() {
            localStorage.clear();
            window.location.href = "/auth/login";
        }

        /* ================= DARK MODE LOGIC ================= */
        const darkToggle = document.getElementById("darkToggle");

        function applyDarkMode() {
            const isDark = localStorage.getItem("darkMode") === "true";

            document.body.classList.toggle("dark", isDark);
            document.getElementById("navbar").classList.toggle("dark", isDark);
            document.getElementById("contentArea").classList.toggle("dark", isDark);

            let tables = document.querySelectorAll(".table");
            tables.forEach(t => t.classList.toggle("dark", isDark));

            darkToggle.innerText = isDark ? "Light Mode" : "Dark Mode";
        }

        darkToggle.addEventListener("click", () => {
            const isDark = document.body.classList.contains("dark");
            localStorage.setItem("darkMode", !isDark);
            applyDarkMode();
        });

        // Apply on page load
        applyDarkMode();
    </script>

</body>
</html>
